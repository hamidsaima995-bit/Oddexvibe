<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0c1e" />
    <meta name="description" content="ODDEX VIBE - a satirical entertainment-only trading simulator. No real money involved." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ODDEX VIBE" />

    <!-- App icons (browser tab, phone home screen) -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- Social media link previews (Open Graph) -->
    <meta property="og:title" content="ODDEX VIBE — Trade Vibes, Drama & Goose Rumors" />
    <meta property="og:description" content="A satirical trading simulator. Free, multiplayer, no real money. Trade absurd assets and climb the leaderboard." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <title>ODDEX VIBE</title>

    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TFF7JGS2WH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TFF7JGS2WH');
    </script>

    <style>
      html, body, #root { height: 100%; margin: 0; background: #0c0c1e; }
      /* Shown briefly while the app's JS loads, then replaced by React */
      #boot-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #0c0c1e;
        font-family: -apple-system, sans-serif; z-index: 99999;
      }
      #boot-loader .logo { font-size: 2rem; font-weight: 800; letter-spacing: 0.08em; color: #fff; margin-bottom: 14px; }
      #boot-loader .logo span { color: #7c6fff; }
      #boot-loader .bar { width: 120px; height: 3px; background: #1e1e38; border-radius: 2px; overflow: hidden; }
      #boot-loader .bar div { width: 40%; height: 100%; background: linear-gradient(90deg,#7c6fff,#00ff88); animation: load 1s ease-in-out infinite; }
      @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    </style>
    <script>
      // Register the service worker so the app works offline and loads fast.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader">
        <div class="logo">ODD<span>EX</span> VIBE</div>
        <div class="bar"><div></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
