<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1e"/>
      <stop offset="100%" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Candlestick bars forming an upward trend -->
  <rect x="110" y="300" width="42" height="120" rx="6" fill="#ff4466"/>
  <rect x="125" y="260" width="12" height="40" fill="#ff4466"/>
  <rect x="210" y="240" width="42" height="100" rx="6" fill="url(#accent)"/>
  <rect x="225" y="200" width="12" height="40" fill="url(#accent)"/>
  <rect x="310" y="180" width="42" height="100" rx="6" fill="url(#accent)"/>
  <rect x="325" y="140" width="12" height="40" fill="url(#accent)"/>
  <rect x="410" y="110" width="42" height="90" rx="6" fill="#00ff88"/>
  <rect x="425" y="80" width="12" height="30" fill="#00ff88"/>
</svg>
